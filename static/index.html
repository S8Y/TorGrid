<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TorGrid — SOCKS5 Proxy Pool</title>
<style>
/* ─── StreamHub Theme (paste.rs/URk5Q) ─────────────────── */
:root {
  --bg-primary: #0b0b0d;
  --bg-secondary: #0d0d10;
  --bg-tertiary: #101014;
  --bg-card: #0f0f12;
  --bg-hover: #161619;
  --bg-elevated: #1a1a1e;
  --border-primary: rgba(255,255,255,0.08);
  --border-secondary: rgba(255,255,255,0.12);
  --border-accent: rgba(255,255,255,0.2);
  --border-subtle: rgba(255,255,255,0.05);
  --text-primary: rgba(255,255,255,0.95);
  --text-secondary: rgba(255,255,255,0.55);
  --text-muted: rgba(255,255,255,0.35);
  --text-dim: rgba(255,255,255,0.2);
  --accent-primary: #a855f7;
  --accent-secondary: #8b5cf6;
  --accent-glow: rgba(168,85,247,0.15);
  --accent-subtle: rgba(168,85,247,0.08);
  --success: #a855f7;
  --success-bg: rgba(168,85,247,0.15);
  --success-border: rgba(168,85,247,0.3);
  --warning: #c084fc;
  --warning-bg: rgba(192,132,252,0.15);
  --danger: #f472b6;
  --danger-bg: rgba(244,114,182,0.15);
  --danger-border: rgba(244,114,182,0.3);
  --info: #8b5cf6;
  --info-bg: rgba(139,92,246,0.15);
  --shadow-xs: 0 1px 2px rgba(0,0,0,0.4);
  --shadow-sm: 0 2px 4px rgba(0,0,0,0.5);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.6);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.7);
  --shadow-glow: 0 0 20px var(--accent-glow);
  --shadow-inset: inset 0 1px 0 rgba(255,255,255,0.03);
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --transition-fast: 0.15s cubic-bezier(0.4,0,0.2,1);
  --transition-normal: 0.25s cubic-bezier(0.4,0,0.2,1);
  --font-mono: 'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',monospace;
  --font-sans: -apple-system,BlinkMacSystemFont,'Inter','SF Pro',system-ui,sans-serif;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;background:var(--bg-primary)}
body{
  font-family:var(--font-sans);background:var(--bg-primary);
  color:var(--text-primary);min-height:100vh;overflow-x:hidden;
  line-height:1.5;
}

/* ─── Canvas particle background ──────────────── */
#particleCanvas{
  position:fixed;inset:0;pointer-events:none;z-index:0;
}

/* ─── Ambient orbs ────────────────────────────── */
@keyframes orb-float{
  0%,100%{transform:translate(0,0)scale(1);opacity:0.15}
  33%{transform:translate(35px,-25px)scale(1.12);opacity:0.25}
  66%{transform:translate(-25px,15px)scale(0.9);opacity:0.12}
}
.orb{
  position:fixed;border-radius:50%;pointer-events:none;z-index:0;
  animation:orb-float 10s ease-in-out infinite;
}
.orb1{width:400px;height:400px;top:5%;right:-5%;
  background:radial-gradient(circle,rgba(168,85,247,0.05),transparent 70%);
  animation-duration:12s;
}
.orb2{width:300px;height:300px;bottom:10%;left:-8%;
  background:radial-gradient(circle,rgba(139,92,246,0.04),transparent 70%);
  animation-delay:-4s;animation-duration:15s;
}
.orb3{width:250px;height:250px;top:45%;left:55%;
  background:radial-gradient(circle,rgba(192,132,252,0.03),transparent 70%);
  animation-delay:-8s;animation-duration:9s;
}

/* ─── App layout ──────────────────────────────── */
.app{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:16px 20px 40px}

/* ─── Header ──────────────────────────────────── */
.header{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
  padding:10px 20px;margin-bottom:16px;
  background:var(--bg-card);border:1px solid var(--border-primary);
  border-radius:var(--radius-xl);position:relative;overflow:hidden;
  box-shadow:var(--shadow-sm),var(--shadow-inset);
}
.header::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent-primary),transparent);
  opacity:0.4;
}
.header-left{display:flex;align-items:center;gap:12px}
.logo{
  font-family:var(--font-mono);font-size:1.25rem;font-weight:700;
  letter-spacing:-0.02em;
  background:linear-gradient(135deg,var(--accent-primary),var(--warning));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-sub{font-size:0.6rem;font-weight:400;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);margin-top:-1px}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.status-indicator{font-size:0.76rem;color:var(--text-secondary);display:flex;align-items:center;gap:5px}
.status-indicator .dot{
  display:inline-block;width:7px;height:7px;border-radius:50%;
  transition:all 0.3s;
}
.dot.online{background:var(--success);box-shadow:0 0 10px var(--accent-primary);animation:dot-pulse 2s ease-in-out infinite}
.dot.offline{background:var(--danger);box-shadow:0 0 10px var(--danger)}
.dot.connecting{background:var(--warning);box-shadow:0 0 10px var(--warning);animation:dot-pulse 1s ease-in-out infinite}
@keyframes dot-pulse{
  0%,100%{opacity:0.5}
  50%{opacity:1}
}

/* ─── Buttons ─────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border:1px solid var(--border-primary);
  border-radius:var(--radius-md);background:var(--bg-hover);
  color:var(--text-primary);font-size:0.74rem;font-family:var(--font-sans);
  cursor:pointer;transition:var(--transition-fast);user-select:none;white-space:nowrap;
  position:relative;overflow:hidden;
}
.btn:hover{border-color:var(--border-secondary);background:var(--bg-elevated);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.btn:active{transform:scale(0.96)}
.btn:disabled{opacity:0.35;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-primary{
  background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));
  border-color:transparent;color:#000;font-weight:600;
}
.btn-primary:hover{filter:brightness(1.15);border-color:transparent;box-shadow:0 0 16px var(--accent-glow)}
.btn-sm{font-size:0.66rem;padding:3px 8px}
.btn-danger{color:var(--danger);border-color:var(--danger-border)}
.btn-danger:hover{background:var(--danger-bg);border-color:var(--danger);color:var(--danger)}
.btn-icon{padding:4px 8px;font-size:0.8rem}

/* ─── Stats bar ───────────────────────────────── */
.stats-bar{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:8px;margin-bottom:14px;
}
.stat-card{
  padding:14px 16px;background:var(--bg-card);
  border:1px solid var(--border-primary);border-radius:var(--radius-xl);
  position:relative;overflow:hidden;transition:var(--transition-fast);
  box-shadow:var(--shadow-xs),var(--shadow-inset);
  cursor:default;
}
.stat-card:hover{border-color:var(--border-secondary);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent-primary),var(--warning));
  opacity:0.3;
}
.stat-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:3px}
.stat-value{font-family:var(--font-mono);font-size:1.2rem;font-weight:700;line-height:1.2}
.stat-value.accent{color:var(--accent-primary)}
.stat-value.info{color:var(--info)}
.stat-value.danger{color:var(--danger)}
.stat-value.warning{color:var(--warning)}
.stat-sub{font-size:0.64rem;color:var(--text-dim);margin-top:2px}

/* Scan line sweep on stat cards */
@keyframes scan-sweep{
  0%{top:-2px;opacity:0}
  5%{opacity:0.4}
  95%{opacity:0.4}
  100%{top:100%;opacity:0}
}
.stat-card .scan-line{
  position:absolute;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent-primary),transparent);
  pointer-events:none;animation:scan-sweep 4s ease-in-out infinite;z-index:0;
}

/* Breathing stat values */
@keyframes breathe{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.015)}
}
.stat-value.breathe{
  animation:breathe 3.5s ease-in-out infinite;
  animation-delay:calc(var(--idx,0)*0.6s);
}

/* ─── Proxy bar ───────────────────────────────── */
.proxy-bar{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;margin-bottom:12px;
  background:var(--bg-card);border:1px solid var(--border-primary);
  border-radius:var(--radius-lg);flex-wrap:wrap;
  box-shadow:var(--shadow-xs),var(--shadow-inset);
}
.proxy-bar-label{font-size:0.68rem;color:var(--text-muted);white-space:nowrap}
.proxy-bar-list{display:flex;gap:4px;flex-wrap:wrap;flex:1;min-width:0}
.proxy-tag{
  font-family:var(--font-mono);font-size:0.6rem;
  padding:2px 7px;border-radius:3px;
  background:var(--accent-subtle);border:1px solid var(--accent-glow);
  color:var(--accent-primary);white-space:nowrap;cursor:pointer;
  transition:var(--transition-fast);
}
.proxy-tag:hover{background:var(--accent-glow);transform:translateY(-1px)}
.proxy-tag.dead{background:var(--danger-bg);border-color:var(--danger-border);color:var(--danger)}
.proxy-tag.dead:hover{background:var(--danger-bg)}

/* ─── Controls ────────────────────────────────── */
.controls{
  display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;
}
.search-box{
  flex:1;min-width:160px;
  padding:7px 12px;border:1px solid var(--border-primary);
  border-radius:var(--radius-lg);background:var(--bg-card);
  color:var(--text-primary);font-size:0.76rem;font-family:var(--font-mono);
  outline:none;transition:var(--transition-fast);
}
.search-box::placeholder{color:var(--text-dim)}
.search-box:focus{border-color:var(--accent-primary);box-shadow:0 0 20px var(--accent-glow)}
.filter-count{font-size:0.7rem;color:var(--text-muted);min-width:50px;text-align:right;font-family:var(--font-mono)}

/* ─── Instance grid ───────────────────────────── */
.grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:8px;
}

/* ─── Card ─────────────────────────────────────── */
.card{
  padding:14px 16px;background:var(--bg-card);
  border:1px solid var(--border-primary);border-radius:var(--radius-xl);
  position:relative;overflow:hidden;cursor:default;
  transition:border-color var(--transition-fast),transform 0.4s cubic-bezier(0.16,1,0.3,1),
    box-shadow 0.4s cubic-bezier(0.16,1,0.3,1);
  box-shadow:var(--shadow-xs),var(--shadow-inset);
  animation:card-in 0.4s ease backwards;
}
.card::after{
  content:'';position:absolute;top:0;left:1px;right:1px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.05),transparent);
  border-radius:inherit inherit 0 0;pointer-events:none;
}
.card:hover{
  border-color:var(--border-secondary);transform:translateY(-2px);
  box-shadow:var(--shadow-md),var(--shadow-inset);
}
.card.dead{opacity:0.45}
.card.dead:hover{opacity:0.65}
@keyframes card-in{
  from{opacity:0;transform:translateY(10px)scale(0.98)}
  to{opacity:1;transform:translateY(0)scale(1)}
}

/* Scan overlay per card */
@keyframes card-scan{
  0%{top:-1px;opacity:0}
  10%{opacity:0.25}
  90%{opacity:0.25}
  100%{top:100%;opacity:0}
}
.card-scan{
  position:absolute;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent-glow),transparent);
  pointer-events:none;animation:card-scan 5s linear infinite;z-index:0;
}

.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;position:relative;z-index:1}
.card-id{
  font-family:var(--font-mono);font-size:0.63rem;font-weight:600;
  padding:2px 8px;border-radius:3px;
  background:var(--accent-subtle);border:1px solid var(--accent-glow);
  color:var(--accent-primary);
}
.card-id.dead{background:var(--danger-bg);border-color:var(--danger-border);color:var(--danger)}
.card-status{display:flex;align-items:center;gap:4px;font-size:0.66rem;color:var(--text-secondary);position:relative;z-index:1}
.card-status .dot{width:5px;height:5px;border-radius:50%}
.dot-card-alive{background:var(--success);box-shadow:0 0 6px var(--accent-primary)}
.dot-card-dead{background:var(--danger);box-shadow:0 0 6px var(--danger)}

.card-proxy{
  font-family:var(--font-mono);font-size:0.68rem;
  padding:4px 8px;margin-bottom:6px;
  background:var(--bg-tertiary);border-radius:var(--radius-md);
  border:1px solid var(--border-subtle);
  color:var(--accent-primary);word-break:break-all;
  display:flex;align-items:center;justify-content:space-between;gap:5px;
  position:relative;z-index:1;
}
.card-proxy .proxy-copy{
  font-size:0.58rem;cursor:pointer;padding:2px 5px;border-radius:2px;
  border:none;background:var(--bg-hover);color:var(--text-dim);
  transition:var(--transition-fast);flex-shrink:0;
}
.card-proxy .proxy-copy:hover{background:var(--bg-elevated);color:var(--text-secondary)}

.card-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:2px 10px;font-size:0.68rem;
  margin-bottom:4px;position:relative;z-index:1;
}
.card-stat-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0}
.card-stat-label{color:var(--text-muted)}
.card-stat-value{font-family:var(--font-mono);color:var(--text-secondary)}
.card-stat-value.accent{color:var(--accent-primary)}
.card-stat-value.danger{color:var(--danger)}
.card-stat-value.info{color:var(--info)}

.card-error{
  font-size:0.6rem;color:var(--danger);
  background:var(--danger-bg);border:1px solid var(--danger-border);
  padding:3px 8px;border-radius:var(--radius-md);margin-bottom:4px;
  word-break:break-all;position:relative;z-index:1;
}

.card-actions{
  display:flex;gap:4px;margin-top:4px;
  padding-top:6px;border-top:1px solid var(--border-subtle);
  position:relative;z-index:1;
}

/* Data pulse on cards */
@keyframes data-pulse-glow{
  0%{box-shadow:inset 0 0 0 0px var(--accent-glow),var(--shadow-xs),var(--shadow-inset)}
  40%{box-shadow:inset 0 0 24px 4px var(--accent-glow),var(--shadow-md),var(--shadow-inset)}
  100%{box-shadow:inset 0 0 0 0px var(--accent-glow),var(--shadow-xs),var(--shadow-inset)}
}
.pulse{animation:data-pulse-glow 0.8s cubic-bezier(0.16,1,0.3,1)}

/* ─── Ripple effect ───────────────────────────── */
.ripple{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle,rgba(168,85,247,0.25) 0%,rgba(139,92,246,0.1) 50%,transparent 70%);
  transform:scale(0);animation:ripple-effect 0.7s cubic-bezier(0.16,1,0.3,1);
  pointer-events:none;z-index:10;
}
@keyframes ripple-effect{
  to{transform:scale(5);opacity:0}
}

/* ─── Empty / Loading ─────────────────────────── */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;color:var(--text-dim);text-align:center;gap:10px;
}
.empty-state .icon{font-size:2.2rem;opacity:0.4}
.empty-state .msg{font-size:0.85rem;color:var(--text-secondary)}
.empty-state .sub{font-size:0.72rem}
.spinner{width:22px;height:22px;border:2px solid var(--border-primary);border-top-color:var(--accent-primary);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Toast ────────────────────────────────────── */
.toast-container{
  position:fixed;bottom:20px;right:20px;z-index:10000;
  display:flex;flex-direction:column;gap:6px;pointer-events:none;
}
.toast{
  padding:8px 14px;border-radius:var(--radius-md);
  font-size:0.76rem;animation:toast-in 0.25s ease;pointer-events:auto;
  border:1px solid var(--border-primary);backdrop-filter:blur(16px);
}
.toast.success{background:var(--success-bg);color:var(--success);border-color:var(--success-border)}
.toast.error{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-border)}
.toast.info{background:var(--accent-subtle);color:var(--accent-primary);border-color:var(--accent-glow)}
@keyframes toast-in{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

/* ─── Copy toast popup ────────────────────────── */
.copy-toast{
  position:fixed;background:var(--bg-elevated);color:var(--success);
  padding:3px 8px;border-radius:var(--radius-md);font-size:0.62rem;
  border:1px solid var(--success-border);pointer-events:none;
  animation:copy-pop 0.8s ease forwards;z-index:20000;
}
@keyframes copy-pop{
  0%{opacity:1;transform:translateY(0)scale(1)}
  100%{opacity:0;transform:translateY(-18px)scale(0.9)}
}

/* ─── Responsive ──────────────────────────────── */
@media(max-width:768px){
  .app{padding:10px}
  .header{flex-direction:column;align-items:stretch}
  .header-right .btn{flex:1;justify-content:center}
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .grid{grid-template-columns:1fr}
  .stat-value{font-size:1rem}
  .controls{flex-direction:column}
  .search-box{min-width:100%}
}
@media(max-width:480px){
  .stats-bar{grid-template-columns:1fr}
}

/* ─── Reduced motion ──────────────────────────── */
@media(prefers-reduced-motion:reduce){
  #particleCanvas{display:none}
  .orb,.stat-value.breathe,.card-scan,
  .stat-card .scan-line{animation:none!important}
  .card{animation:none!important;transition:none!important}
  .card:hover{transform:none!important}
  .btn:hover{transform:none!important}
  .pulse{animation:none!important}
  .toast{animation:none!important}
  .copy-toast{animation:none!important}
}
</style>
</head>
<body>

<canvas id="particleCanvas"></canvas>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="app" id="app">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div>
        <div class="logo">TorGrid</div>
        <div class="logo-sub">SOCKS5 Proxy Pool</div>
      </div>
    </div>
    <div class="header-right">
      <span class="status-indicator">
        <span class="dot connecting" id="statusDot"></span>
        <span id="statusText">Connecting</span>
      </span>
      <button class="btn btn-primary" onclick="copyAllProxies()" title="Copy all SOCKS5 proxy URLs">📋 Copy All</button>
      <button class="btn" onclick="rotateAll()" title="Request new Tor circuits for all instances">🔄 Rotate All</button>
    </div>
  </header>

  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card" style="--idx:0">
      <div class="scan-line"></div>
      <div class="stat-label">Alive / Total</div>
      <div class="stat-value breathe accent" id="statAlive">—</div>
      <div class="stat-sub" id="statDeadDetail"></div>
    </div>
    <div class="stat-card" style="--idx:1">
      <div class="scan-line"></div>
      <div class="stat-label">Bandwidth</div>
      <div class="stat-value breathe info" id="statBwIn">0 B/s</div>
      <div class="stat-sub" id="statBwOut">0 B/s out</div>
    </div>
    <div class="stat-card" style="--idx:2">
      <div class="scan-line"></div>
      <div class="stat-label">Circuits</div>
      <div class="stat-value breathe warning" id="statCircuits">0</div>
      <div class="stat-sub">across all Tor exits</div>
    </div>
    <div class="stat-card" style="--idx:3">
      <div class="scan-line"></div>
      <div class="stat-label">Uptime</div>
      <div class="stat-value breathe" id="statUptime">0s</div>
      <div class="stat-sub" id="statTransfer">0 GB transferred</div>
    </div>
  </div>

  <!-- Proxy Bar -->
  <div class="proxy-bar">
    <span class="proxy-bar-label">SOCKS5</span>
    <div class="proxy-bar-list" id="proxyList"></div>
    <button class="btn btn-sm" onclick="copyAllProxies()" title="Copy all proxy URLs">📋</button>
  </div>

  <!-- Controls -->
  <div class="controls">
    <input class="search-box" id="searchBox" type="text" placeholder="Filter by port, IP, country, status…" oninput="filterCards()" spellcheck="false">
    <span class="filter-count" id="filterCount">0 / 0</span>
  </div>

  <!-- Grid -->
  <div id="gridContainer">
    <div class="empty-state">
      <div class="spinner"></div>
      <div class="msg">Connecting to TorGrid backend…</div>
      <div class="sub">Waiting for WebSocket</div>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ─── Particle Canvas ───────────────────────────
(function(){
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (prefersReducedMotion) return;
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let w, h, particles = [];
  const COUNT = 80;

  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  for(let i=0; i<COUNT; i++){
    particles.push({
      x: Math.random() * w, y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 1.2 + 0.3,
      a: Math.random() * 0.3 + 0.05,
    });
  }

  function draw(){
    ctx.clearRect(0, 0, w, h);
    for(const p of particles){
      p.x += p.vx; p.y += p.vy;
      if(p.x < 0) p.x = w; if(p.x > w) p.x = 0;
      if(p.y < 0) p.y = h; if(p.y > h) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(168, 85, 247, ${p.a})`;
      ctx.fill();
    }
    // Draw connections
    for(let i=0; i<particles.length; i++){
      for(let j=i+1; j<particles.length; j++){
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < 120){
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(168, 85, 247, ${0.06 * (1 - dist/120)})`;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ─── Ripple on click ───────────────────────────
document.addEventListener('mousedown', function(e){
  const target = e.target.closest('.btn, .card, .stat-card, .proxy-tag');
  if(!target) return;
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const rect = target.getBoundingClientRect();
  const size = Math.min(Math.max(rect.width, rect.height) * 1.3, 250);
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
  const pos = getComputedStyle(target).position;
  if(pos === 'static') target.style.position = 'relative';
  target.appendChild(ripple);
  setTimeout(() => ripple.remove(), 700);
});

// ─── State ──────────────────────────────────────
let state = null;
let ws = null;
let reconnectDelay = 1;
let reconnectTimer = null;

// ─── WebSocket ──────────────────────────────────
function connectWS(){
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    setStatus('online', 'Connected');
    reconnectDelay = 1;
    if(reconnectTimer){ clearTimeout(reconnectTimer); reconnectTimer = null; }
  };

  ws.onmessage = (e) => {
    try{
      const msg = JSON.parse(e.data);
      if(msg.type === 'state'){
        const oldAgg = state ? state.aggregate : null;
        const newAgg = msg.aggregate;
        state = msg;
        render(msg);
        // Data pulse on state change
        if(oldAgg && (oldAgg.alive !== newAgg.alive || oldAgg.dead !== newAgg.dead)){
          document.querySelectorAll('.card').forEach(c => {
            c.classList.remove('pulse');
            void c.offsetWidth;
            c.classList.add('pulse');
            setTimeout(() => c.classList.remove('pulse'), 1000);
          });
        }
      }
    } catch(_){}
  };

  ws.onclose = () => {
    if(state) render(state);
    setStatus('offline', 'Disconnected');
    scheduleReconnect();
  };
  ws.onerror = () => { ws.close(); };
}

function scheduleReconnect(){
  if(reconnectTimer) return;
  const delay = Math.min(reconnectDelay, 30);
  setStatus('connecting', `Reconnecting in ${delay}s…`);
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    reconnectDelay = Math.min(reconnectDelay * 2, 30);
    connectWS();
  }, delay * 1000);
}

function setStatus(type, text){
  document.getElementById('statusDot').className = 'dot ' + type;
  document.getElementById('statusText').textContent = text;
}

function esc(s){
  if(s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Formatting ──────────────────────────────────
function fmtBW(b){
  if(!b || b < 1) return '0 B/s';
  if(b < 1024) return b + ' B/s';
  if(b < 1048576) return (b/1024).toFixed(1) + ' KB/s';
  return (b/1048576).toFixed(2) + ' MB/s';
}
function fmtBytes(b){
  if(!b || b < 0) return '0 B';
  if(b < 1024) return b + ' B';
  if(b < 1048576) return (b/1024).toFixed(1) + ' KB';
  if(b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
  return (b/1073741824).toFixed(2) + ' GB';
}
function fmtUptime(s){
  if(!s || s < 0) return '0s';
  if(s < 60) return Math.round(s) + 's';
  if(s < 3600) return Math.floor(s/60) + 'm ' + Math.round(s%60) + 's';
  if(s < 86400) return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
  return Math.floor(s/86400) + 'd ' + Math.floor((s%86400)/3600) + 'h';
}
function fmtCountry(c){ return c ? c.toUpperCase() : '—'; }

// ─── Render ──────────────────────────────────────
function render(msg){
  const insts = msg.instances || [];
  const agg = msg.aggregate || {};
  const filter = (document.getElementById('searchBox').value || '').toLowerCase();
  const now = Date.now();

  // Stats
  const aliveEl = document.getElementById('statAlive');
  aliveEl.innerHTML = `${agg.alive || 0} <span style="font-size:0.65rem;font-weight:400;color:var(--text-dim)">/ ${agg.total || 0}</span>`;
  if(agg.dead){
    document.getElementById('statDeadDetail').textContent = `${agg.dead} offline`;
    document.getElementById('statDeadDetail').style.color = 'var(--danger)';
  } else {
    document.getElementById('statDeadDetail').textContent = 'All online';
    document.getElementById('statDeadDetail').style.color = 'var(--text-dim)';
  }
  document.getElementById('statBwIn').textContent = fmtBW(agg.total_bandwidth_in);
  document.getElementById('statBwOut').textContent = fmtBW(agg.total_bandwidth_out) + ' out';
  document.getElementById('statCircuits').textContent = agg.total_circuits || 0;
  document.getElementById('statUptime').textContent = fmtUptime(agg.uptime);
  document.getElementById('statTransfer').textContent = fmtBytes(agg.total_read + agg.total_written) + ' transferred';

  // Proxy bar
  const proxyListEl = document.getElementById('proxyList');
  proxyListEl.innerHTML = (agg.proxy_list || []).map((p, i) => {
    const alive = insts[i] && insts[i].alive;
    return `<span class="proxy-tag ${alive ? '' : 'dead'}" onclick="copyProxy('${esc(p)}', this)" title="Click to copy">${esc(p)}</span>`;
  }).join('');

  // Filter
  let filtered = insts.filter(i => {
    if(!filter) return true;
    return (i.exit_ip||'').toLowerCase().includes(filter)
      || (i.proxy||'').toLowerCase().includes(filter)
      || (i.alive ? 'alive' : 'dead').includes(filter)
      || (i.error||'').toLowerCase().includes(filter)
      || (i.exit_country||'').toLowerCase().includes(filter)
      || String(i.socks_port).includes(filter);
  });
  document.getElementById('filterCount').textContent = `${filtered.length} / ${insts.length}`;

  const container = document.getElementById('gridContainer');

  if(insts.length === 0){
    container.innerHTML = `<div class="empty-state"><div class="spinner"></div><div class="msg">Booting Tor instances…</div><div class="sub">New circuits take 30–60s</div></div>`;
    return;
  }

  container.innerHTML = `<div class="grid">${filtered.map((inst, i) => renderCard(inst, i)).join('')}</div>`;
}

function renderCard(inst, idx){
  const alive = inst.alive;
  const statusCls = alive ? 'alive' : 'dead';
  const style = `animation-delay:${(idx % 20) * 0.03}s`;

  return `<div class="card ${alive ? '' : 'dead'}" style="${style}">
    <div class="card-scan"></div>
    <div class="card-top">
      <span class="card-id ${alive ? '' : 'dead'}">T${String(inst.id).padStart(2,'0')}</span>
      <span class="card-status">
        <span class="dot dot-card-${statusCls}"></span>
        ${alive ? 'Alive' : (inst.error ? 'Error' : 'Offline')}
      </span>
    </div>
    <div class="card-proxy">
      <span>${esc(inst.proxy)}</span>
      <button class="proxy-copy" onclick="copyProxy('${esc(inst.proxy)}', this)" title="Copy proxy URL">📋</button>
    </div>
    <div class="card-stats">
      <div class="card-stat-row"><span class="card-stat-label">Exit IP</span><span class="card-stat-value accent">${inst.exit_ip ? esc(inst.exit_ip) : '⏳'}</span></div>
      <div class="card-stat-row"><span class="card-stat-label">Country</span><span class="card-stat-value">${fmtCountry(inst.exit_country)}</span></div>
      <div class="card-stat-row"><span class="card-stat-label">BW In</span><span class="card-stat-value info">${fmtBW(inst.bandwidth_in)}</span></div>
      <div class="card-stat-row"><span class="card-stat-label">BW Out</span><span class="card-stat-value danger">${fmtBW(inst.bandwidth_out)}</span></div>
      <div class="card-stat-row"><span class="card-stat-label">Circuits</span><span class="card-stat-value">${inst.circuit_count || 0}</span></div>
      <div class="card-stat-row"><span class="card-stat-label">Port</span><span class="card-stat-value">${inst.socks_port}</span></div>
      <div class="card-stat-row"><span class="card-stat-label">Read</span><span class="card-stat-value">${fmtBytes(inst.total_read)}</span></div>
      <div class="card-stat-row"><span class="card-stat-label">Written</span><span class="card-stat-value">${fmtBytes(inst.total_written)}</span></div>
      <div class="card-stat-row" style="grid-column:span 2"><span class="card-stat-label">Uptime</span><span class="card-stat-value">${fmtUptime(inst.uptime)}</span></div>
    </div>
    ${inst.error ? `<div class="card-error">${esc(inst.error)}</div>` : ''}
    <div class="card-actions">
      <button class="btn btn-sm" onclick="rotateInstance(${inst.id})" ${!alive ? 'disabled' : ''}>🔄 Rotate</button>
      <button class="btn btn-sm btn-danger" onclick="restartInstance(${inst.id})">🔁 Restart</button>
    </div>
  </div>`;
}

// ─── Filter ──────────────────────────────────────
function filterCards(){ if(state) render(state); }

// ─── API ──────────────────────────────────────────
async function apiPost(path){
  try{
    const r = await fetch(path, { method: 'POST' });
    const data = await r.json();
    if(!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
    return data;
  } catch(e){
    toast(e.message, 'error');
    return null;
  }
}

async function rotateInstance(idx){
  const r = await apiPost(`/api/instances/${idx}/new-identity`);
  if(r) toast(`T${String(idx).padStart(2,'0')} — new circuit requested`, 'info');
}

async function rotateAll(){
  toast('Rotating all circuits…', 'info');
  await apiPost('/api/new-identity-all');
}

async function restartInstance(idx){
  const r = await apiPost(`/api/instances/${idx}/restart`);
  if(r) toast(`T${String(idx).padStart(2,'0')} — restarting`, 'info');
  else toast(`Restart failed for T${String(idx).padStart(2,'0')}`, 'error');
}

// ─── Clipboard ────────────────────────────────────
function copyProxy(text, el){
  navigator.clipboard.writeText(text).then(() => {
    const tip = document.createElement('div');
    tip.className = 'copy-toast';
    tip.textContent = '✓ Copied!';
    tip.style.left = '50%';
    tip.style.top = '40%';
    tip.style.transform = 'translateX(-50%)';
    document.body.appendChild(tip);
    setTimeout(() => tip.remove(), 800);
  });
}

function copyAllProxies(){
  if(!state || !state.aggregate || !state.aggregate.proxy_list){
    toast('No proxies available', 'error');
    return;
  }
  navigator.clipboard.writeText(state.aggregate.proxy_list.join('\n')).then(() => {
    toast(`All ${state.aggregate.proxy_list.length} proxies copied`, 'success');
  });
}

// ─── Toast ────────────────────────────────────────
function toast(msg, type){
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast ' + (type || 'info');
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 3000);
}

// ─── Init ─────────────────────────────────────────
connectWS();
</script>
